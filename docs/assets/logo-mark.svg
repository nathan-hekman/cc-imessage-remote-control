<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" role="img" aria-label="cc-imessage-remote-control — TiVo-style smiling blob with curly antennas, dot eyes, a colorful CC wordmark, and two stubby feet.">

  <!-- Curly asymmetric antennas with prominent balls (TiVo signature) -->
  <!-- Left antenna: an S-curve squiggle -->
  <path d="M 26 30 C 22 22, 28 16, 22 12 C 16 8, 14 6, 12 3"
        stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="12" cy="3" r="4" fill="#1a1a1a"/>

  <!-- Right antenna: a gentler outward curve, hint of a curl at the tip -->
  <path d="M 74 30 C 78 22, 82 14, 86 8 C 87 6, 88 5, 90 5"
        stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="90" cy="5" r="4" fill="#1a1a1a"/>

  <!-- Organic blob body — soft, hand-drawn cloud shape, wider on top, narrowing near feet -->
  <path d="M 50 28
           C 32 28, 18 30, 12 42
           C 6 54, 8 68, 14 80
           C 18 88, 26 94, 36 96
           L 36 100
           C 34 102, 32 104, 32 106
           L 44 106
           C 44 102, 46 99, 48 96
           L 52 96
           C 54 99, 56 102, 56 106
           L 68 106
           C 68 104, 66 102, 64 100
           L 64 96
           C 74 94, 82 88, 86 80
           C 92 68, 94 54, 88 42
           C 82 30, 68 28, 50 28 Z"
        fill="#1a1a1a"/>

  <!-- Tiny dot eyes near the top of the body -->
  <circle cx="40" cy="42" r="2.2" fill="#faf8f4"/>
  <circle cx="60" cy="42" r="2.2" fill="#faf8f4"/>

  <!-- "CC" wordmark — playful, multi-color like TiVo's logo. Slight rotation per letter for hand-drawn feel. -->
  <g font-family="'Marker Felt', 'Comic Sans MS', 'Chalkboard SE', -apple-system, BlinkMacSystemFont, Inter, sans-serif" font-weight="900" font-size="34">
    <!-- First C: red, slightly tilted left -->
    <text x="32" y="68" fill="#e51e25" text-anchor="middle" transform="rotate(-6 32 68)">c</text>
    <!-- Second C: blue, slightly tilted right -->
    <text x="58" y="70" fill="#0a84ff" text-anchor="middle" transform="rotate(5 58 70)">c</text>
    <!-- Yellow accent dot like TiVo's "i" dot -->
    <circle cx="48" cy="46" r="2.3" fill="#fbe7a3"/>
  </g>

  <!-- Wide white TiVo-style smile -->
  <path d="M 28 80 Q 50 96 72 80" stroke="#faf8f4" stroke-width="3.6" fill="none" stroke-linecap="round"/>
  <!-- Tiny tongue/lower-lip touch -->
  <path d="M 44 88 Q 50 92 56 88" stroke="#faf8f4" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
